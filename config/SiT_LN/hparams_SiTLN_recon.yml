data:
  data_path: ../data/{}/{} #../data/{}/{}
  translation: ICAd15_schfd100 # mesh dim -> nemat dim.  # ICAd15_schfd100 ICAd15_schfd300 ICAd15_glasserd360
  version: normICAdemeanMAT
  model_type: kSiTLN
  from_parcellation: 100
  to_icamap: 15
  icores: 2

logging:
  folder_to_save_model: ../logs/SiT/
  sanity_file_pth: /ceph/chpc/shared/janine_bijsterbosch_group/naranjorincon_scratch/NeuroTranslate/surf2netmat/batch/kSiTLN_recon_normICAdemeanMAT_schfd100_MSEtrain
  test_file_pth: /ceph/chpc/shared/janine_bijsterbosch_group/naranjorincon_scratch/NeuroTranslate/surf2netmat/batch/kSiTLN_recon_normICAdemeanMAT_schfd100_MSEtrain_test
  model_out_root: /ceph/chpc/shared/janine_bijsterbosch_group/naranjorincon_scratch/NeuroTranslate/surf2netmat/model_out
  sanity_check_version: recon_krakenonly

training:
  fcn_train: train_MSE_skewloss #train_MSE_skewloss #train_krakenonly
  flag_experiment_ICArecon: False
  fcn_model_to_use: SurfaceImageTransformer #linear_translator
  dataset_choice: ABCD # ABCD or HCPYA or HCPYA_ABCDdr
  LR: 0.01 #0.00001 is original
  bs: 32 # batch size, og is 256
  val_epoch: 1 #5 is our standard, arbitary so feel free to change.
  epochs: 100
  bilateral_condition: False #if true, uses 2LR, else just 1L
  hemi_cond: 1L
  channel_specific_condition: False #if true, does predictions on a single channel
  specific_channel: 0 #0-ICA_dim, so ICAd15 => 0,1,...,14 ## 1 = DMN in this case
  specific_channel_end: 0
  netmat_prep_choice: demean #norm or fisherz or demean, None, demean_fisherz
  surf_prep_choice: norm
  parcellation_corr_type: full #full or partial
  overfit_condition: True
  overfit_condition_sub_range: 2000 # up to which subj, if overfit_condition false this is ignored
  VAE_flag: False

testing:
  immediate_test_flag: True #test after training immediately
  chosen_test_model: MSE #can be MSE, MAE, RHO
  same_sample_test: True # if this is true, then out of sample false and vice versa
  out_of_sample_test: False
  bs_test: 1

transformer:
  depth: 6 #layers # O(D*H*(V**x)) dont recall the exponent x but it scales apprx like this so not too high
  heads: 3 # D=depth=layer, 
  sit_dim: 192 # tiny-192, small-384
  dim_head: 64 #64, 128
  emb_dropout: 0.3
  dropout: 0.5 # moved this higher, was originall 0.1
  krak_mse_weight: 1000 #1,000 # recon weight
  rho_loss_weight: 0 #original has been 10,000
  krak_latent_weight: 10 #10 #latent weight
  krak_corrEYE_weight: 1 #1000
  model_details: 011426_d6h3_tiny_adamW_cosinedecay_recon_MSEtrain_1L_full_demean_exp100_wGelu_ico04

optimisation:
  optimiser: AdamW # SGD = stochastic gradent descent; Adam = Adam optimization

Adam:
  weight_decay: 0.001

AdamW:
  weight_decay: 0.001 #originally just this
  use_scheduler: True #orig is false, but in paper they said they did use scheduler=>cosine decay
  scheduler: CosineDecay  # CosineDecay, StepLR, ReduceLROnPlateau
  warmup: True
  nbr_step_warmup: 50
  
SGD:
  weight_decay: 0.
  momentum: 0.9
  nesterov: False
  
StepLR: 
  stepsize: 1000
  decay: 0.5

CosineDecay:
  T_max: 30 #5000. is original, # 25 for now because it seems to converge at that epoch which could be a local minima
  eta_min: 0.000001

CosineDecayRestart:
  T_0: 25 #Number of iterations until the first restart.
  T_mult: 1 #A factor by which T_i increases after a restart. Default: 1.
  eta_min: 0.00001
  
