# general_model_type: &general_model_type "kSiTLN"

data:
  data_path: ../data/{}/{} #../data/{}/{}
  translation: ICAd15_schfd100 # mesh dim -> nemat dim
  version: normICArawMAT
  model_type: kSiTLN
  from_parcellation: 100
  to_icamap: 15
                                                                                                                                                                                                                             
logging:
  folder_to_save_model: ../logs/SiT/ #"/home/naranjorincon/logs/SiT/" #"../logs/SiT/"
  sanity_file_pth: /ceph/chpc/shared/janine_bijsterbosch_group/naranjorincon_scratch/NeuroTranslate/surf2netmat/batch/kSiTLN_krakenonly.print
  model_out_root: /ceph/chpc/shared/janine_bijsterbosch_group/naranjorincon_scratch/NeuroTranslate/surf2netmat/model_out
  sanity_check_version: skewloss 

training:
# testing to see if given a fcn name, it can call it from utils and use it 
#so we can have one script that we can test on instead of one train script per model test
  fcn_train: train_krakenonly
  dataset_choice: ABCD # ABCD or ABCD for now at least
  LR: 0.0001 #0.00001 is original
  bs: 32 # batch size, og is 256
  val_epoch: 5 #5 is our standard, arbitary so feel free to change.
  epochs: 500
  lamda: 1.5 # absed on literature, ideal is [1,2] between
  bilateral_condition: False #if true, uses 2LR, else just 1L
  channel_specific_condition: False #if true, does predictions on a single channel
  specific_channel: 1 #0-ICA_dim, so ICAd15 => 0,1,...,14 ## 1 = DMN in this case
  netmat_prep_choise: None #norm or fisherz or None
  overfit_condition: False
  overfit_condition_sub_range: 30 # up to which subj, if overfit_condition false this is ignored

testing:
  immediate_test_flag: True #test after training immediately
  chosen_test_model: MSE #use this bash command to change all files: sed -i 's/\bRHO\b/MSE/g' ./*.yml
  bs_test: 1

transformer:
  depth: 6 #layers # O(D*H*(V**x)) dont recall the exponent x but it scales apprx like this so not too high
  heads: 5 # D=depth=layer, 
  sit_dim: 384
  dim_head: 64
  emb_dropout: 0.3
  dropout: 0.1 # moved this higher, was originall 0.1
  krak_mse_weight: 1 #1000 # recon weight
  krak_latent_weight: 1 #10 #latent weight
  krak_corrEYE_weight: 1 #1000
  skew_weight: 10
  model_details: d6h5_adamW_cosinedecay_scheduler_krakenonlyd10_krakenonly

optimisation:
  optimiser: AdamW # SGD = stochastic gradent descent; Adam = Adam optimization

Adam:
  weight_decay: 0.001

AdamW:
  weight_decay: 0. #originally just this
  use_scheduler: True #orig is false, but in paper they said they did use scheduler=>cosine decay
  scheduler: CosineDecay  # CosineDecay, StepLR, ReduceLROnPlateau
  warmup: True
  nbr_step_warmup: 50
  
SGD:
  weight_decay: 0.
  momentum: 0.9
  nesterov: False
  
StepLR: 
  stepsize: 1000
  decay: 0.5

CosineDecay:
  T_max: 5000
  eta_min: 0.0001

